name: fuelwise
description: "FuelWise — track fuel efficiency, spending, and best-value stations, and plan trips with your real MPG."
publish_to: 'none'
version: 0.18.0+18

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  http: ^1.2.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.0
  open_filex: ^4.3.2
  geolocator: ^13.0.0
  flutter_blue_plus: ^1.32.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
